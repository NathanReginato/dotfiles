[[themes]]
name = "kanagawa_dragon"
[themes.palette]
background = "#181616"
foreground = "#c5c9c5"
black = "#0d0c0c"
red = "#c4746e"
green = "#8a9a7b"
yellow = "#c4b28a"
blue = "#8ba4b0"
magenta = "#a292a3"
cyan = "#8ea4a2"
white = "#c8c093"
bright_black = "#a6a69c"
bright_red = "#e46876"
bright_green = "#87a987"
bright_yellow = "#e6c384"
bright_blue = "#7fb4ca"
bright_magenta = "#938aa9"
bright_cyan = "#7aa89f"
bright_white = "#c5c9c5"
[themes.component_style]
block_title = { fg = "#8ba4b0", modifiers = ["Bold"] }
border = { fg = "#393836" }
playback_status = { fg = "#8ea4a2", modifiers = ["Bold"] }
playback_track = { fg = "#c5c9c5", modifiers = ["Bold"] }
playback_artists = { fg = "#8ea4a2", modifiers = ["Bold"] }
playback_album = { fg = "#c4b28a" }
playback_genres = { fg = "#737c73", modifiers = ["Italic"] }
playback_metadata = { fg = "#737c73" }
playback_progress_bar = { bg = "#282727", fg = "#87a987" }
playback_progress_bar_unfilled = { bg = "#282727" }
current_playing = { fg = "#87a987", modifiers = ["Bold"] }
page_desc = { fg = "#8ba4b0", modifiers = ["Bold"] }
playlist_desc = { fg = "#737c73", modifiers = ["Dim"] }
table_header = { fg = "#7fb4ca" }
selection = { fg = "#c5c9c5", bg = "#282727", modifiers = ["Bold"] }
secondary_row = { fg = "#a6a69c" }
like = { fg = "#a292a3" }
lyrics_played = { fg = "#737c73", modifiers = ["Dim"] }
lyrics_playing = { fg = "#b6927b", modifiers = ["Bold"] }
